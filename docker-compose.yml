services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stealmyheart-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stealmyheart
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stealmyheart"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
